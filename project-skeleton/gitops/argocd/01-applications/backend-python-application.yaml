apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-python
  namespace: argocd
spec:
  project: training-project
  source:
    repoURL: https://github.com/Sermarmu1999/practica-gitops-uned.git
    targetRevision: HEAD
    path: project-skeleton/k8s/04-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
